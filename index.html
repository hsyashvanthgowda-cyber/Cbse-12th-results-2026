<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CBSE .nic Results 2026</title>

  <link rel="stylesheet" href="style.css">
</head>
  <header class="cbse-banner">
    <div class="left-box">
      <img
        src="https://upload.wikimedia.org/wikipedia/en/thumb/8/84/Central_Board_of_Secondary_Education_logo.svg/1200px-Central_Board_of_Secondary_Education_logo.svg.png"
        alt="CBSE Logo"
        class="logo"
      />

      <div class="text-content">
        <h2>केंद्रीय माध्यमिक शिक्षा बोर्ड</h2>
        <h1>Central Board of Secondary Education</h1>
      </div>
    </div>

    <div class="right-box">
      <h1>https://cbseresults.nic.in</h1>
      <h2>Examination Results 2026</h2>
    </div>
  </header>
<body>

<div class="container">

    <div class="top-bar">
        CBSE
    </div>

    <div class="sub-title">
        Class XII Results 2026
    </div>

    <div class="form-box">

        <label>Roll Number</label>
        <input type="text" id="roll" placeholder="Enter Roll Number">

        <label>School Number</label>
        <input type="text" id="school" placeholder="Enter School Number">

        <label>Admit Card ID</label>
        <input type="text" id="admit" placeholder="Enter Admit Card ID">

        <label>Security Pin</label>

        <div class="captcha-box">
            <div class="captcha" id="captchaText">P25JM0</div>
            <input type="text" id="captchaInput" placeholder="Enter Security Pin">
        </div>

        <div class="buttons">
            <button class="submit-btn" onclick="submitForm()">Submit</button>
            <button class="reset-btn" onclick="resetForm()">Reset</button>
        </div>

    </div>

    <div class="footer">
        © CBSE Results Portal
           CBSE.nic.com
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
